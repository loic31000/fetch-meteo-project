<!DOCTYPE html>
<html>
  <head>
    <title>MeteoSPA Open-Meteo</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
  </head>
  <body>
    <!-- Saisie de la ville -->
    <section>
      <input id="city" placeholder="Ville..." />
      <button id="button" class="button" onclick="rechercheVille()">🔍</button>
      <br />
    </section>

    <!-- Saisie de latitude et longitude -->
    <section>
      <input id="lat" placeholder="latitude..." />
      <input id="lon" placeholder="longitude..." />
      <br /><br />
    </section>
    <!-- Zone d'affichage des résultats météo -->
    <div id="result"></div>

    <div>
    <button id="ma position" class="ma position" onclick="getMyPosition()">Ma position 🔍</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
